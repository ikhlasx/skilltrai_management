version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
  
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: skilltrain
      POSTGRES_USER: skilltrain
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: 